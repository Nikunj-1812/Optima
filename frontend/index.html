<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting - Optima</title>
    <script>
        const token = localStorage.getItem('token');
        const user = localStorage.getItem('user');
        if (token && user) {
            window.location.href = 'dashboard.html';
        } else {
            window.location.href = 'login.html';
        }
    </script>
</head>
<body>
    <p style="font-family: sans-serif; text-align: center; margin-top: 4rem; color: #646462;">
        Redirecting to Optima Workspace...
    </p>
</body>
</html>
