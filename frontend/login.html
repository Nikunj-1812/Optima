<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - Optima</title>
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%230C447C%22/><path d=%22M30 70 L50 35 L70 70 Z%22 fill=%22%231D9E75%22/><path d=%22M45 45 L50 35 L55 45 Z%22 fill=%22%237F77DD%22/></svg>">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <main class="auth-container">
        <!-- Header -->
        <header class="auth-header">
            <div class="auth-brand">
                <span>Optima</span>
            </div>
            <h1 class="auth-title">Welcome back</h1>
            <p class="auth-subtitle">Please log in to your account</p>
        </header>

        <!-- Form -->
        <form id="login-form" novalidate autocomplete="off">
            <!-- Username Field -->
            <div class="form-group">
                <label for="username" class="form-label">Username</label>
                <div class="input-wrapper">
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        class="form-input" 
                        placeholder="Enter your username" 
                        required
                    >
                </div>
                <div id="username-feedback" class="form-feedback"></div>
            </div>

            <!-- Password Field -->
            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <div class="input-wrapper">
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        class="form-input form-input-password" 
                        placeholder="Enter your password" 
                        required
                    >
                    <button type="button" class="toggle-password" aria-label="Toggle password visibility">
                        <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <g class="eye-show">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </g>
                            <g class="eye-hide" style="display: none;">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                                <line x1="1" y1="1" x2="23" y2="23"></line>
                            </g>
                        </svg>
                    </button>
                </div>
                <div id="password-feedback" class="form-feedback"></div>
            </div>

            <!-- Submit Button -->
            <button type="submit" id="submit-btn" class="btn-primary">
                Log in
            </button>
        </form>

        <!-- Footer -->
        <footer class="auth-footer">
            Don't have an account? 
            <a href="signup.html" class="auth-link">Sign up</a>
        </footer>
    </main>

    <!-- Client-side Auth Logic -->
    <script src="js/auth.js"></script>
</body>
</html>
